# Production stack — self-contained (does NOT layer on docker-compose.yml).
# Run:  docker compose -f docker-compose.prod.yml up --build
# Serves the BUILT PWA via nginx (web image's `prod` stage) at :8080,
# with /api proxied to the api container. The base docker-compose.yml
# (dev / Vite HMR) is left entirely untouched.
services:
  db:
    build: ./db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-poly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poly}
      POSTGRES_DB: ${POSTGRES_DB:-poly_tracker}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-poly}:${POSTGRES_PASSWORD:-poly}@db:5432/${POSTGRES_DB:-poly_tracker}}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN}
      API_PORT: ${API_PORT:-3001}
      PHOTO_STORAGE_PATH: ${PHOTO_STORAGE_PATH:-/data/photos}
    volumes:
      - photo_data:/data/photos
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      target: prod
      args:
        # Baked into the static bundle at build time (Vite). API base is
        # same-origin (/api) via the nginx proxy in this image.
        VITE_API_BASE: /api
        VITE_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    depends_on:
      - api
    ports:
      - "${NGINX_PORT:-8080}:80"

volumes:
  db_data:
  photo_data:
