services:
  db:
    build: ./db
    environment:
      POSTGRES_USER: poly
      POSTGRES_PASSWORD: poly
      POSTGRES_DB: poly_tracker
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poly -d poly_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://poly:poly@db:5432/poly_tracker}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN}
      API_PORT: ${API_PORT:-3001}
      PHOTO_STORAGE_PATH: ${PHOTO_STORAGE_PATH:-/data/photos}
    volumes:
      - photo_data:/data/photos
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-3001}:3001"

  web:
    build: ./web
    environment:
      VITE_API_BASE: /api
      VITE_MAPBOX_TOKEN: ${MAPBOX_TOKEN}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5173}:5173"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    ports:
      - "8080:80"

volumes:
  db_data:
  photo_data:
