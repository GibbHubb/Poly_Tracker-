# Reverse proxy: single origin for the SPA + API so the service worker can
# cache same-origin /api GETs and tiles. Browse the app at http://localhost:8080
upstream web_dev {
    server web:5173;
}
upstream api_srv {
    server api:3001;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 30m;

    location /api/ {
        proxy_pass http://api_srv;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;        # headroom for slow photo uploads
    }

    # Vite dev server (HMR websocket included).
    location / {
        proxy_pass http://web_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
