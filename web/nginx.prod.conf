# Production: serve the built SPA statically and proxy /api to the api
# container. Single origin so the service worker can cache same-origin
# /api GETs + tiles. Baked into the web image's `prod` stage.
upstream api_srv {
    server api:3001;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 30m;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api_srv;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Never cache the service worker so updates roll out immediately
    # (precached assets are content-hashed and cached normally).
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files /sw.js =404;
    }

    # SPA fallback: client-side routes (e.g. /farms/<id>) → index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
